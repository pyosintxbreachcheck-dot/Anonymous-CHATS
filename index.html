<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .message { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-zinc-800 flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-inner">G</div>
                <div>
                    <h1 class="font-semibold text-2xl tracking-tighter">GroupChat</h1>
                    <p class="text-emerald-400 text-xs flex items-center gap-1"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Live Demo</p>
                </div>
            </div>

            <!-- User Info -->
            <div class="p-4 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" onclick="changeUsername()" 
                         class="w-11 h-11 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-2xl cursor-pointer shadow-md">👤</div>
                    <div class="flex-1">
                        <div id="username-display" class="font-semibold text-lg">You</div>
                        <div class="flex items-center gap-1 text-emerald-400 text-sm">
                            <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                            online
                        </div>
                    </div>
                </div>
            </div>

            <!-- Groups -->
            <div class="flex-1 overflow-y-auto">
                <div class="px-4 pt-6 pb-3">
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h2 class="uppercase text-xs font-semibold tracking-widest text-zinc-400">Groups</h2>
                        <button onclick="createGroup()" 
                                class="flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 transition-colors text-blue-400 hover:text-blue-300 text-sm font-medium px-4 py-2 rounded-2xl">
                            <i class="fa-solid fa-plus"></i>
                            <span>New</span>
                        </button>
                    </div>

                    <div id="groups-list" class="space-y-1 pr-2"></div>
                </div>
            </div>

            <!-- Join -->
            <div class="p-5 border-t border-zinc-800 bg-zinc-950">
                <div class="text-xs uppercase tracking-widest text-zinc-400 mb-3 font-medium">Join with code</div>
                <div class="flex gap-2">
                    <input id="join-code" type="text" maxlength="8"
                           placeholder="ABC12345"
                           class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-3xl px-5 py-3 text-sm font-mono focus:outline-none">
                    <button onclick="joinGroup()" 
                            class="bg-white text-zinc-900 hover:bg-zinc-100 px-7 font-semibold rounded-3xl text-sm">Join</button>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="flex-1 flex flex-col">
            <!-- Chat Header -->
            <div id="chat-header" class="h-16 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="group-icon" class="w-11 h-11 rounded-3xl flex items-center justify-center text-3xl shadow-inner"></div>
                    <div>
                        <div id="group-name" class="font-semibold text-xl">Welcome to GroupChat</div>
                        <div id="group-info" class="text-zinc-400 text-sm font-mono">Select or create a group</div>
                    </div>
                </div>
                
                <div class="flex items-center gap-6 text-zinc-400">
                    <button onclick="toggleMembers()" class="hover:text-zinc-100 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-users"></i>
                        <span class="text-sm hidden md:inline">Members</span>
                    </button>
                    <button onclick="copyGroupCode()" class="flex items-center gap-2 hover:text-white transition-colors">
                        <i class="fa-solid fa-link"></i>
                        <span id="current-code-display" class="font-mono text-sm hidden sm:inline"></span>
                    </button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto chat-container p-6 space-y-7 bg-[radial-gradient(#27272a_1px,transparent_1px)] bg-[length:30px_30px]">
            </div>

            <!-- Message Input -->
            <div class="bg-zinc-900 border-t border-zinc-800 p-5">
                <div id="preview" class="hidden mb-4"></div>
                
                <div class="flex items-end gap-3">
                    <div class="flex gap-1">
                        <label onclick="document.getElementById('image-input').click()" 
                               class="w-12 h-12 hover:bg-zinc-800 transition-colors flex items-center justify-center text-zinc-400 hover:text-blue-400 rounded-3xl cursor-pointer">
                            <i class="fa-solid fa-image text-2xl"></i>
                        </label>
                        <input id="image-input" type="file" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                        
                        <button onclick="startVoiceRecord()" 
                                class="w-12 h-12 hover:bg-zinc-800 transition-colors flex items-center justify-center text-zinc-400 hover:text-rose-400 rounded-3xl">
                            <i class="fa-solid fa-microphone text-2xl"></i>
                        </button>
                    </div>
                    
                    <div class="flex-1">
                        <input id="message-input" 
                               type="text"
                               placeholder="Message #general..."
                               onkeydown="if(event.key === 'Enter' &amp;&amp; !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                               class="w-full bg-zinc-800 border border-transparent focus:border-blue-500 rounded-3xl px-7 py-4 text-[17px] focus:outline-none">
                    </div>
                    
                    <button onclick="sendMessage()" 
                            class="w-12 h-12 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-3xl flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-paper-plane -rotate-45"></i>
                    </button>
                </div>
                
                <div class="text-center text-[10px] text-zinc-500 mt-4">Open multiple tabs to simulate different users • Changes sync instantly</div>
            </div>
        </div>

        <!-- Members Panel -->
        <div id="members-panel" class="w-80 bg-zinc-900 border-l border-zinc-800 hidden md:flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h3 class="font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-users"></i>
                    Members in room
                </h3>
            </div>
            <div id="members-list" class="flex-1 p-6 space-y-6 overflow-auto">
                <!-- JS populated -->
            </div>
        </div>
    </div>

    <!-- Voice Recorder -->
    <div id="voice-modal" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-sm mx-4">
            <div class="p-10 text-center">
                <div class="mx-auto w-20 h-20 bg-rose-500/10 rounded-full flex items-center justify-center mb-8">
                    <div id="voice-pulse" class="w-12 h-12 bg-rose-500 rounded-full animate-ping"></div>
                </div>
                
                <div id="recording-timer" class="font-mono text-6xl tracking-tighter text-white mb-10">00:00</div>
                
                <div class="flex justify-center gap-6">
                    <button onclick="cancelVoiceRecord()" 
                            class="px-8 py-4 rounded-3xl border border-zinc-700 hover:bg-zinc-800 text-zinc-300 flex items-center gap-2">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </button>
                    <button onclick="stopVoiceRecord()" 
                            class="px-10 py-4 bg-rose-500 hover:bg-rose-600 rounded-3xl text-white font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-stop"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Globals
        let currentUser = localStorage.getItem("username") || "You" + Math.floor(100 + Math.random() * 900);
        let currentRoom = null;
        let groups = JSON.parse(localStorage.getItem("groups") || "[]");
        let messages = JSON.parse(localStorage.getItem("messages") || "{}");
        const bc = new BroadcastChannel("groupchat_demo");

        let mediaRecorder = null;
        let audioChunks = [];
        let timerInterval = null;
        let startRecordTime = 0;
        let currentPreviewFile = null;

        // Tailwind ready
        function init() {
            document.getElementById("username-display").textContent = currentUser;
            renderGroups();
            bc.onmessage = (e) => {
                if (e.data.type === "message" && e.data.room === currentRoom) {
                    if (!messages[currentRoom]) messages[currentRoom] = [];
                    messages[currentRoom].push(e.data.msg);
                    localStorage.setItem("messages", JSON.stringify(messages));
                    renderMessages();
                }
            };
            
            // Welcome demo
            if (!messages["DEMO42"]) {
                messages["DEMO42"] = [
                    {id: 1, user: "Sarah", type: "text", content: "Hi team! How's the new project going?", time: Date.now() - 1000000},
                    {id: 2, user: "Alex", type: "text", content: "Just pushed some updates 🚀", time: Date.now() - 900000}
                ];
                groups.push({name: "Product Launch", code: "DEMO42"});
                localStorage.setItem("groups", JSON.stringify(groups));
                localStorage.setItem("messages", JSON.stringify(messages));
            }
        }

        function renderGroups() {
            const list = document.getElementById("groups-list");
            list.innerHTML = "";
            
            if (groups.length === 0) {
                list.innerHTML = `<div class="opacity-40 text-center py-12 text-sm">No groups joined yet.<br>Create one above.</div>`;
                return;
            }
            
            groups.forEach(group => {
                const active = group.code === currentRoom;
                const div = document.createElement("div");
                div.className = `group px-5 py-4 rounded-3xl cursor-pointer flex gap-4 items-center transition-all ${active ? 'bg-zinc-800 shadow-inner' : 'hover:bg-zinc-800/70'}`;
                div.innerHTML = `
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-cyan-400 text-white rounded-2xl flex items-center justify-center text-3xl font-light">${group.name[0].toUpperCase()}</div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-medium truncate">${group.name}</div>
                        <div class="text-xs font-mono text-zinc-500">${group.code}</div>
                    </div>
                `;
                div.onclick = () => switchToRoom(group.code, group.name);
                list.appendChild(div);
            });
        }

        function createGroup() {
            const name = prompt("Group name?", "Marketing Sync");
            if (!name || !name.trim()) return;
            
            const code = (Math.random().toString(36) + "000000").slice(2, 10).toUpperCase();
            
            groups.unshift({ name: name.trim(), code });
            localStorage.setItem("groups", JSON.stringify(groups));
            renderGroups();
            switchToRoom(code, name.trim());
        }

        function joinGroup() {
            let code = document.getElementById("join-code").value.trim().toUpperCase();
            if (!code) return alert("Please enter a group code");
            
            if (groups.find(g => g.code === code)) {
                const group = groups.find(g => g.code === code);
                switchToRoom(code, group.name);
                document.getElementById("join-code").value = "";
                return;
            }
            
            const name = prompt("Name for this group?", "Joined Group");
            if (!name) return;
            
            groups.unshift({name: name.trim(), code});
            localStorage.setItem("groups", JSON.stringify(groups));
            renderGroups();
            switchToRoom(code, name.trim());
            document.getElementById("join-code").value = "";
        }

        function switchToRoom(code, name) {
            currentRoom = code;
            document.getElementById("group-name").textContent = name || "Unnamed";
            document.getElementById("group-info").innerHTML = `Code: <span class="font-mono">${code}</span>`;
            document.getElementById("current-code-display").textContent = code;
            document.getElementById("group-icon").innerHTML = name ? name[0].toUpperCase() : "💬";
            renderGroups();
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById("messages");
            container.innerHTML = "";
            
            if (!currentRoom || !messages[currentRoom] || messages[currentRoom].length === 0) {
                container.innerHTML = `
                <div class="h-full flex flex-col justify-center items-center text-center">
                    <div class="text-7xl mb-6 opacity-30">💬</div>
                    <p class="text-xl font-light text-zinc-400">No messages yet</p>
                    <p class="text-zinc-500 mt-2 max-w-[260px]">Send the first message or open another tab to simulate teammates</p>
                </div>`;
                return;
            }
            
            messages[currentRoom].forEach(msg => {
                const mine = msg.user === currentUser;
                const bubble = document.createElement("div");
                bubble.className = `flex ${mine ? 'justify-end' : 'justify-start'} message`;
                
                let html = '';
                
                if (msg.type === "text") {
                    html = `
                    <div class="${mine ? 'bg-blue-600 text-white' : 'bg-zinc-800'} rounded-3xl px-6 py-3.5 max-w-[280px] md:max-w-md">
                        ${!mine ? `<div class="text-blue-400 text-xs mb-1">${msg.user}</div>` : ''}
                        <div class="leading-relaxed">${msg.content}</div>
                        <div class="text-[10px] mt-2 opacity-70 text-right">${new Date(msg.time).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</div>
                    </div>`;
                } else if (msg.type === "image") {
                    html = `
                    <div class="${mine ? 'text-right' : ''} max-w-[260px]">
                        ${!mine ? `<div class="text-xs text-zinc-400 mb-1">${msg.user}</div>` : ''}
                        <img src="${msg.content}" class="rounded-3xl border border-zinc-700 max-h-72 object-contain" />
                        <div class="text-[10px] text-zinc-400 mt-2">${new Date(msg.time).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</div>
                    </div>`;
                } else if (msg.type === "voice") {
                    html = `
                    <div class="${mine ? 'text-right' : ''}">
                        ${!mine ? `<div class="text-xs text-zinc-400 mb-1">${msg.user}</div>` : ''}
                        <div onclick="playVoice(this)" data-src="${msg.content}" class="cursor-pointer bg-zinc-800 hover:bg-zinc-700 transition-colors rounded-3xl px-5 py-4 inline-flex items-center gap-4">
                            <i class="fa-solid fa-play text-blue-400"></i>
                            <span class="text-sm">Voice message</span>
                        </div>
                        <div class="text-[10px] mt-1 text-zinc-400">${new Date(msg.time).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</div>
                    </div>`;
                }
                
                bubble.innerHTML = html;
                container.appendChild(bubble);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            if (!currentRoom) return alert("Please select a group first");
            
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            
            if (!messages[currentRoom]) messages[currentRoom] = [];
            
            if (text) {
                const msg = {
                    id: Date.now(),
                    user: currentUser,
                    type: "text",
                    content: text,
                    time: Date.now()
                };
                messages[currentRoom].push(msg);
                broadcastMessage(msg);
                input.value = "";
            }
            
            if (currentPreviewFile) {
                const msg = {
                    id: Date.now(),
                    user: currentUser,
                    type: currentPreviewFile.type,
                    content: currentPreviewFile.data,
                    time: Date.now()
                };
                messages[currentRoom].push(msg);
                broadcastMessage(msg);
                clearPreview();
            }
            
            localStorage.setItem("messages", JSON.stringify(messages));
            renderMessages();
        }

        function broadcastMessage(msg) {
            bc.postMessage({
                type: "message",
                room: currentRoom,
                msg: msg
            });
        }

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentPreviewFile = {
                    type: "image",
                    data: ev.target.result
                };
                showPreview();
            };
            reader.readAsDataURL(file);
        }

        function showPreview() {
            const container = document.getElementById("preview");
            container.classList.remove("hidden");
            container.innerHTML = `
                <div class="inline-flex items-center bg-zinc-800 rounded-3xl pl-3 pr-5 py-2 gap-4">
                    <img src="${currentPreviewFile.data}" class="h-14 w-14 object-cover rounded-2xl">
                    <div>
                        <div class="text-sm">Image ready</div>
                        <button onclick="clearPreview()" class="text-red-400 text-xs hover:underline">Remove</button>
                    </div>
                </div>
            `;
        }

        function clearPreview() {
            currentPreviewFile = null;
            document.getElementById("preview").classList.add("hidden");
        }

        function startVoiceRecord() {
            if (!currentRoom) {
                alert("Join or create a group first");
                return;
            }
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    currentPreviewFile = { type: "voice", data: url };
                    showPreview();
                    
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                startRecordTime = Date.now();
                document.getElementById("voice-modal").classList.remove("hidden");
                
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - startRecordTime) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    document.getElementById("recording-timer").textContent = `${m}:${s}`;
                }, 300);
            }).catch(() => alert("Could not access microphone"));
        }

        function stopVoiceRecord() {
            if (mediaRecorder) mediaRecorder.stop();
            clearInterval(timerInterval);
            document.getElementById("voice-modal").classList.add("hidden");
        }

        function cancelVoiceRecord() {
            if (mediaRecorder) mediaRecorder.stop();
            clearInterval(timerInterval);
            document.getElementById("voice-modal").classList.add("hidden");
            audioChunks = [];
        }

        function playVoice(el) {
            const audio = new Audio(el.getAttribute("data-src"));
            audio.play();
        }

        function changeUsername() {
            const newName = prompt("Your display name:", currentUser);
            if (newName && newName.trim()) {
                currentUser = newName.trim();
                localStorage.setItem("username", currentUser);
                document.getElementById("username-display").textContent = currentUser;
            }
        }

        function toggleMembers() {
            const panel = document.getElementById("members-panel");
            panel.classList.toggle("hidden");
            
            const demoHTML = `
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-emerald-500 text-white font-bold rounded-2xl flex items-center justify-center">SJ</div>
                    <div class="flex-1">
                        <div>Sarah Jones</div>
                        <div class="text-xs text-emerald-400">online now</div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-10 h-10 bg-amber-500 text-white font-bold rounded-2xl flex items-center justify-center">RK</div>
                    <div class="flex-1">
                        <div>Rahul Kumar</div>
                        <div class="text-xs text-zinc-400">last active 2m ago</div>
                    </div>
                </div>`;
            document.getElementById("members-list").innerHTML = demoHTML;
        }

        function copyGroupCode() {
            if (!currentRoom) return;
            navigator.clipboard.writeText(currentRoom).then(() => {
                const orig = document.getElementById("current-code-display").textContent;
                document.getElementById("current-code-display").textContent = "✅ Copied!";
                setTimeout(() => {
                    document.getElementById("current-code-display").textContent = orig;
                }, 1800);
            });
        }

        window.onload = () => {
            init();
        };
    </script>
</body>
</html>
